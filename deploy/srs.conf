# SRS 默认配置文件
# 文档: https://ossrs.net/lts/zh-cn/docs/v6/doc/config

listen              1935;
max_connections     1000;
daemon              off;
srs_log_tank        console;
srs_log_level       trace;

http_api {
    enabled         on;
    listen          1985;
}

http_server {
    enabled         on;
    listen          8080;
    dir             ./objs/nginx/html;
}

rtc_server {
    enabled on;
    listen 8000 udp;
    # @see https://ossrs.net/lts/zh-cn/docs/v6/doc/webrtc#config-candidate
    candidate $CANDIDATE;
}


# 默认虚拟主机，匹配所有推流域名
vhost __defaultVhost__ {
    # 低延迟配置
    tcp_nodelay     on;
    min_latency     on;

    # WebRTC 支持，实现毫秒级延迟
    rtc {
        enabled     on;
        rtmp_to_rtc on;
        rtc_to_rtmp off;
    }

    http_remux {
        enabled         on;
        mount           [vhost]/[app]/[stream].flv;
    }

    # 播放优化
    play {
        gop_cache       off; # 关闭缓存，WebRTC 建议关闭以减少首屏堆积
        queue_length    10;
        mw_latency      20;  # 降低合并发送延迟
    }

    # 推流优化
    publish {
        mr              off; # 关闭合并发送
    }
    
    http_hooks {
        enabled         on;
        # Windows Docker Desktop 友好配置：
        # SRS 与回调网关通过 compose 默认网络互通，直接使用服务名访问。
        on_publish      http://srs-callback-gateway:13000/api/srs/hook;
        on_unpublish    http://srs-callback-gateway:13000/api/srs/hook;
        on_play         http://srs-callback-gateway:13000/api/srs/hook;
        on_stop         http://srs-callback-gateway:13000/api/srs/hook;
    }
}
