<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SRS Callback Gateway Login</title>
  <link rel="stylesheet" href="/static/styles.css?v={{STATIC_V}}">
</head>
<body>
  <div class="login-shell">
    <section class="login-hero">
      <div class="hero-badge">SRS Callback Gateway</div>
      <p class="eyebrow">Internal Console</p>
      <h1>统一管理你的 SRS 回调与投递链路</h1>
      <p class="muted">登录后即可查看路由规则、事件投递状态和失败记录，集中处理回调转发链路里的异常与重试任务。</p>
      <div class="login-feature-list">
        <div class="login-feature-item">
          <strong>路由规则</strong>
          <span>按 vhost、app、stream 和事件类型精准分发。</span>
        </div>
        <div class="login-feature-item">
          <strong>投递追踪</strong>
          <span>实时查看成功、重试中和失败的回调记录。</span>
        </div>
        <div class="login-feature-item">
          <strong>快速排障</strong>
          <span>在一个后台里定位超时、鉴权失败和目标地址错误。</span>
        </div>
      </div>
    </section>
    <section class="token-card auth-card login-card">
      <div class="auth-card-copy">
        <p class="auth-kicker">Admin Access</p>
        <h2>登录控制台</h2>
        <p class="muted">使用管理员账号进入后台，查看路由规则与投递状态。</p>
      </div>
      <form id="loginForm" class="auth-panel" method="post" action="#" autocomplete="on" novalidate>
        <label for="adminUsername">账号</label>
        <input id="adminUsername" name="username" value="admin" autocomplete="username" required>
        <label for="adminPassword">密码</label>
        <input id="adminPassword" name="password" type="password" placeholder="请输入管理密码" autocomplete="current-password" required>
        <button id="loginButton" class="login-button" type="submit">进入后台</button>
        <small id="loginStatus" class="muted login-hint" role="status" aria-live="polite">登录成功后会自动跳转到管理界面。</small>
      </form>
    </section>
  </div>
  <script src="/static/login.js?v={{STATIC_V}}"></script>
</body>
</html>
