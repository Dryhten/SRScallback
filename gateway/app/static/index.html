<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SRS Callback Gateway</title>
  <link rel="stylesheet" href="/static/styles.css?v={{STATIC_V}}">
</head>
<body>
  <div class="shell" id="adminShell">
    <aside class="sidebar">
      <div class="brand-block">
        <p class="eyebrow">Internal Console</p>
        <h1>SRS Callback Gateway</h1>
        <p class="muted">内部轻量运维台，管理路由规则和异步投递状态。</p>
      </div>
      <div class="token-card auth-card">
        <div class="auth-card-copy">
          <p class="auth-kicker">Admin Session</p>
          <h2>管理控制台</h2>
        </div>
        <div id="sessionPanel" class="session-panel">
          <div class="session-meta">
            <p class="session-label">当前会话</p>
            <strong id="sessionUsername">admin</strong>
            <span class="session-note">已通过管理员身份登录</span>
          </div>
          <button type="button" id="logoutButton" class="session-logout">退出登录</button>
        </div>
      </div>
      <nav class="tabs">
        <button data-view="routes" class="active">路由规则</button>
        <button data-view="deliveries">投递记录</button>
        <button data-view="failures">失败记录</button>
      </nav>
    </aside>
    <main class="content">
      <section id="routesView" class="panel active">
        <div class="panel-header">
          <div>
            <h2>路由规则</h2>
            <p>按 vhost、app、stream 与事件类型匹配；<strong>priority 数值越大越优先</strong>（同事件可多规则）。匹配成功后向目标 URL 投递 JSON。</p>
          </div>
          <button type="button" id="newRouteButton">新建规则</button>
        </div>
        <div id="routeFormContainer" class="card hidden"></div>
        <div id="routesTable" class="table-card"></div>
      </section>
      <section id="deliveriesView" class="panel">
        <div class="panel-header">
          <div>
            <h2>投递记录</h2>
            <p>查看各状态下的投递快照；需要<strong>重新入队</strong>时请到「失败记录」页操作。</p>
          </div>
          <select id="deliveryStatusFilter">
            <option value="">全部状态</option>
            <option value="pending">待处理</option>
            <option value="retrying">重试中</option>
            <option value="processing">处理中</option>
            <option value="succeeded">成功</option>
            <option value="failed">失败</option>
          </select>
        </div>
        <div id="deliveriesTable" class="table-card"></div>
      </section>
      <section id="failuresView" class="panel">
        <div class="panel-header">
          <div>
            <h2>失败记录</h2>
            <p>仅展示状态为「失败」的投递；列表样式与投递记录一致。「操作」中的 <strong>重新入队</strong> 会调用后端接口，将任务重新加入队列。</p>
          </div>
        </div>
        <div id="failuresTable" class="table-card"></div>
      </section>
    </main>
  </div>
  <script src="/static/app.js?v={{STATIC_V}}"></script>
</body>
</html>
